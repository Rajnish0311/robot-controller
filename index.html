<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  padding: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1a1a2e);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.container {
  width: 320px;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(15px);
  box-shadow: 0 0 30px rgba(0,0,0,0.4);
  text-align: center;
  color: white;
}

h2 {
  margin-bottom: 20px;
}

.btn {
  width: 90px;
  height: 55px;
  margin: 8px;
  border: none;
  border-radius: 12px;
  font-size: 20px;
  font-weight: bold;
  color: white;
  cursor: pointer;

  background: linear-gradient(145deg, #00c6ff, #0072ff);
  box-shadow: 0 0 10px rgba(0, 150, 255, 0.6);

  transition: all 0.2s ease;
}

.btn:hover {
  transform: scale(1.08);
  box-shadow: 0 0 20px rgba(0, 150, 255, 1);
}

.btn:active {
  transform: scale(0.95);
  box-shadow: 0 0 8px rgba(0, 150, 255, 0.5);
}

.speed-box {
  margin-top: 20px;
  padding: 15px;
  border-radius: 15px;
  background: rgba(255,255,255,0.1);
}

input[type=range] {
  width: 100%;
  cursor: pointer;
}

p {
  margin-bottom: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <h2>🚗 Robot Controller</h2>

  <!-- Forward -->
  <button class="btn"
    onmousedown="cmd('F')" onmouseup="cmd('S')"
    ontouchstart="cmd('F')" ontouchend="cmd('S')">
    ⬆️
  </button><br>

  <!-- Left & Right -->
  <button class="btn"
    onmousedown="cmd('L')" onmouseup="cmd('S')"
    ontouchstart="cmd('L')" ontouchend="cmd('S')">
    ⬅️
  </button>

  <button class="btn"
    onmousedown="cmd('R')" onmouseup="cmd('S')"
    ontouchstart="cmd('R')" ontouchend="cmd('S')">
    ➡️
  </button><br>

  <!-- Backward -->
  <button class="btn"
    onmousedown="cmd('B')" onmouseup="cmd('S')"
    ontouchstart="cmd('B')" ontouchend="cmd('S')">
    ⬇️
  </button>

  <div class="speed-box">
    <p>⚡ Speed Control</p>
    <input type="range" min="0" max="1023" value="800"
           onchange="setSpeed(this.value)">
  </div>
</div>

<script>
function cmd(c){
  fetch('/move?dir=' + c);
}
function setSpeed(v){
  fetch('/speed?val=' + v);
}
</script>

</body>
</html>
